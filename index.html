<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="EasyInstall Pro v9 - أتمتة إعداد ويندوز. اختر تطبيقاتك وقم بتوليد أمر واحد لتثبيتها بصمت. Windows Setup Automation Tool." />
  <meta name="keywords" content="winget, windows, installer, silent install, setup automation, EasyInstall Pro" />
  <meta name="author" content="Omar Yakan" />
  <meta name="theme-color" content="#0f172a" />
  <title>EasyInstall Pro v9 - مثبت ويندوز الصامت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --violet-400: #a78bfa;
      --violet-500: #8b5cf6;
      --violet-600: #7c3aed;
      --amber-400: #fbbf24;
      --rose-400: #fb7185;
      --rose-500: #f43f5e;
      --cyan-400: #22d3ee;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --slate-950: #020617;
      --red-400: #f87171;

      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(148, 163, 184, 0.1);
      --glass-highlight: rgba(255, 255, 255, 0.05);
      --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      --gradient-success: linear-gradient(135deg, #10b981, #34d399);
      --gradient-hero: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.2);
      --radius-xl: 1rem;
      --radius-2xl: 1.25rem;
      --radius-3xl: 1.5rem;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--slate-950);
      color: var(--slate-100);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    body[dir="rtl"] {
      font-family: 'Tajawal', 'Inter', system-ui, sans-serif;
    }

    body[dir="ltr"] {
      font-family: 'Inter', 'Tajawal', system-ui, sans-serif;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--slate-700);
      border-radius: 9999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--slate-600);
    }

    /* ===== ANIMATED BG ===== */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
    }

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(139, 92, 246, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 60%);
    }

    /* ===== LAYOUT ===== */
    .container {
      width: 100%;
      max-width: 1360px;
      margin-inline: auto;
      padding-inline: 1.25rem;
    }

    .hidden {
      display: none !important;
    }

    /* ===== KEYFRAMES ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInBottom {
      from {
        opacity: 0;
        transform: translateY(30px) translateX(-50%);
      }

      to {
        opacity: 1;
        transform: translateY(0) translateX(-50%);
      }
    }

    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
      }

      50% {
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
      }
    }

    @keyframes checkmarkDraw {
      from {
        stroke-dashoffset: 30;
      }

      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes borderPulse {

      0%,
      100% {
        border-color: rgba(59, 130, 246, 0.3);
      }

      50% {
        border-color: rgba(59, 130, 246, 0.6);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-in {
      animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .animate-delay-1 {
      animation-delay: 0.1s;
    }

    .animate-delay-2 {
      animation-delay: 0.2s;
    }

    .animate-delay-3 {
      animation-delay: 0.3s;
    }

    /* ===== GRADIENT TEXT ===== */
    .gradient-text {
      background: linear-gradient(135deg, var(--blue-400), var(--violet-400), var(--cyan-400));
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gradient-text-emerald {
      background: linear-gradient(135deg, var(--emerald-400), var(--cyan-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== HEADER ===== */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      transition: var(--transition-smooth);
    }

    #app-header.scrolled {
      background: rgba(2, 6, 23, 0.92);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    .header-inner {
      max-width: 1360px;
      margin-inline: auto;
      padding-inline: 1.25rem;
      height: 4.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-box {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 0.875rem;
      background: var(--gradient-primary);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      transition: var(--transition-smooth);
    }

    .logo-box:hover {
      transform: scale(1.08) rotate(-3deg);
    }

    .logo-text h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .logo-text p {
      font-size: 0.7rem;
      color: var(--slate-400);
      font-weight: 500;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(139, 92, 246, 0.15);
      color: var(--violet-400);
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      margin-inline-start: 0.5rem;
      letter-spacing: 0.05em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Search */
    .search-wrap {
      position: relative;
      display: none;
    }

    @media (min-width: 768px) {
      .search-wrap {
        display: block;
      }
    }

    .search-wrap input {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--glass-border);
      border-radius: 0.875rem;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      color: var(--slate-100);
      width: 18rem;
      outline: none;
      transition: var(--transition-smooth);
      font-family: inherit;
      backdrop-filter: blur(8px);
    }

    .search-wrap input:focus {
      border-color: var(--blue-500);
      width: 22rem;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12), 0 0 20px rgba(59, 130, 246, 0.1);
    }

    .search-icon-pos {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--slate-500);
    }

    [dir="rtl"] .search-icon-pos {
      right: 0.875rem;
    }

    [dir="ltr"] .search-icon-pos {
      left: 0.875rem;
    }

    [dir="rtl"] .search-wrap input {
      padding-right: 2.75rem;
    }

    [dir="ltr"] .search-wrap input {
      padding-left: 2.75rem;
    }

    .search-clear-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--slate-500);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: var(--transition-smooth);
    }

    [dir="rtl"] .search-clear-btn {
      left: 0.75rem;
    }

    [dir="ltr"] .search-clear-btn {
      right: 0.75rem;
    }

    .search-clear-btn:hover {
      color: white;
      transform: translateY(-50%) scale(1.1);
    }

    .search-shortcut {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--slate-600);
      background: var(--slate-800);
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      border: 1px solid var(--slate-700);
      pointer-events: none;
    }

    [dir="rtl"] .search-shortcut {
      left: 0.75rem;
    }

    [dir="ltr"] .search-shortcut {
      right: 0.75rem;
    }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 0.875rem;
      padding: 0.25rem;
      border: 1px solid var(--glass-border);
      gap: 0.2rem;
      backdrop-filter: blur(8px);
    }

    .lang-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 0.7rem;
      font-size: 0.75rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      color: var(--slate-500);
      background: transparent;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .lang-btn.active {
      background: var(--gradient-primary);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      color: white;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.35);
    }

    .lang-btn:not(.active):hover {
      color: var(--slate-200);
      background: rgba(255, 255, 255, 0.05);
    }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      max-width: 1360px;
      margin-inline: auto;
      padding-inline: 1.25rem;
      padding-block: 2.5rem;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ===== HERO ===== */
    .hero {
      margin-bottom: 3.5rem;
      text-align: center;
      padding-block: 2rem;
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .hero h2 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 900;
      color: white;
      margin-bottom: 1.25rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .hero p {
      font-size: 1.05rem;
      color: var(--slate-400);
      margin-bottom: 2.5rem;
      max-width: 42rem;
      margin-inline: auto;
      line-height: 1.7;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--glass-bg);
      color: var(--slate-300);
      padding: 0.625rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
      transition: var(--transition-smooth);
    }

    .hero-badge:hover {
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }

    .hero-badge-icon {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      padding: 1rem 1.5rem;
      background: var(--glass-bg);
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
      transition: var(--transition-smooth);
      min-width: 120px;
    }

    .hero-stat:hover {
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateY(-3px);
    }

    .hero-stat .number {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      font-family: 'Inter', 'JetBrains Mono', monospace;
    }

    .hero-stat .label {
      font-size: 0.75rem;
      color: var(--slate-400);
      margin-top: 0.25rem;
    }

    /* ===== TABS ===== */
    .tabs-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
    }

    .tabs-inner {
      background: var(--glass-bg);
      padding: 0.35rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      backdrop-filter: blur(12px);
    }

    .tab-btn {
      padding: 0.7rem 1.5rem;
      border-radius: 0.8rem;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      color: var(--slate-400);
      background: transparent;
      font-family: inherit;
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tab-btn .tab-icon {
      display: flex;
      align-items: center;
    }

    .tab-btn.active {
      background: var(--gradient-primary);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .tab-btn:not(.active):hover {
      color: white;
      background: rgba(255, 255, 255, 0.06);
    }

    .drive-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(5, 150, 105, 0.1);
      color: var(--emerald-400);
      padding: 0.7rem 1.5rem;
      border-radius: var(--radius-xl);
      font-size: 0.875rem;
      font-weight: 700;
      border: 1px solid rgba(16, 185, 129, 0.2);
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .drive-btn:hover {
      background: rgba(5, 150, 105, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.15);
    }

    /* ===== LAYOUT ===== */
    .layout-with-sidebar {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .layout-with-sidebar {
        flex-direction: row;
      }

      [dir="rtl"] .layout-with-sidebar {
        flex-direction: row;
      }
    }

    .sidebar {
      width: 100%;
    }

    @media (min-width: 768px) {
      .sidebar {
        width: 16rem;
        flex-shrink: 0;
      }
    }

    .sidebar-sticky {
      position: sticky;
      top: 6rem;
    }

    .cat-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      padding-inline: 0.5rem;
    }

    .cat-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition-smooth);
      color: var(--slate-400);
      background: transparent;
      font-family: inherit;
      margin-bottom: 0.25rem;
    }

    .cat-btn .cat-count {
      font-size: 0.7rem;
      background: var(--slate-800);
      color: var(--slate-500);
      padding: 0.1rem 0.5rem;
      border-radius: 9999px;
      font-weight: 600;
    }

    .cat-btn.active {
      background: rgba(59, 130, 246, 0.1);
      color: var(--blue-400);
      border-color: rgba(59, 130, 246, 0.2);
    }

    .cat-btn.active .cat-count {
      background: rgba(59, 130, 246, 0.2);
      color: var(--blue-400);
    }

    .cat-btn:not(.active):hover {
      background: rgba(255, 255, 255, 0.03);
      color: white;
    }

    .tip-box {
      margin-top: 2rem;
      padding: 1.25rem;
      border-radius: var(--radius-xl);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
    }

    .tip-box h4 {
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tip-box p {
      font-size: 0.75rem;
      color: var(--slate-400);
      line-height: 1.7;
    }

    /* ===== SOFTWARE GRID ===== */
    .sw-grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }

    .sw-grid-header h3 {
      font-size: 1.35rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.02em;
    }

    .sw-grid-header .count {
      color: var(--slate-500);
      font-weight: 500;
      font-size: 0.85rem;
      margin-inline-start: 0.5rem;
    }

    .btn-action {
      font-size: 0.8rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition-smooth);
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
    }

    .btn-action.select-all {
      color: var(--blue-400);
    }

    .btn-action.select-all:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-action.clear-sel {
      color: var(--red-400);
    }

    .btn-action.clear-sel:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .sw-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }

    @media (min-width: 480px) {
      .sw-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .sw-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1400px) {
      .sw-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .sw-card {
      position: relative;
      padding: 1.125rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      cursor: pointer;
      user-select: none;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .sw-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .sw-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
      transform: translateY(-3px);
      box-shadow: var(--shadow-card);
    }

    .sw-card.selected {
      background: rgba(59, 130, 246, 0.08);
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.15), 0 8px 25px rgba(59, 130, 246, 0.1);
    }

    .sw-card.selected::before {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
    }

    .sw-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .sw-icon-wrap {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 0.875rem;
      background: var(--slate-800);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      overflow: hidden;
      transition: var(--transition-smooth);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sw-card:hover .sw-icon-wrap {
      transform: scale(1.05);
    }

    .sw-card.selected .sw-icon-wrap {
      box-shadow: 0 0 0 2px var(--blue-500);
      border-color: transparent;
    }

    .sw-icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sw-check {
      width: 1.375rem;
      height: 1.375rem;
      border-radius: 9999px;
      border: 2px solid var(--slate-700);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      flex-shrink: 0;
    }

    .sw-card.selected .sw-check {
      background: var(--gradient-primary);
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .sw-card.selected .sw-check svg {
      animation: checkmarkDraw 0.3s ease both;
    }

    .sw-card h4 {
      font-weight: 700;
      color: white;
      margin-bottom: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
    }

    .sw-winget {
      font-size: 0.65rem;
      color: var(--slate-500);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 0.75rem;
    }

    .sw-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--blue-400);
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .sw-link:hover {
      color: var(--violet-400);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding-block: 5rem;
    }

    .empty-icon-wrap {
      width: 5rem;
      height: 5rem;
      background: var(--glass-bg);
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-inline: auto;
      margin-bottom: 1.25rem;
      border: 1px solid var(--glass-border);
    }

    .empty-state h4 {
      font-size: 1.125rem;
      font-weight: 600;
      color: white;
    }

    .empty-state p {
      color: var(--slate-500);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    /* ===== EXTRA COMMANDS ===== */
    .extra-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }

    @media (min-width: 768px) {
      .extra-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .cmd-card {
      position: relative;
      padding: 1.25rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      cursor: pointer;
      user-select: none;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
    }

    .cmd-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
      pointer-events: none;
    }

    .cmd-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .cmd-card.selected {
      background: rgba(59, 130, 246, 0.08);
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.15);
    }

    .cmd-card.essential:not(.selected) {
      border-color: rgba(59, 130, 246, 0.3);
      background: rgba(59, 130, 246, 0.06);
      animation: borderPulse 2s ease infinite;
    }

    .cmd-card.essential:not(.selected)::after {
      content: '';
      position: absolute;
      top: 0.75rem;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--blue-500);
      box-shadow: 0 0 8px var(--blue-500);
    }

    [dir="rtl"] .cmd-card.essential:not(.selected)::after {
      left: 0.75rem;
    }

    [dir="ltr"] .cmd-card.essential:not(.selected)::after {
      right: 0.75rem;
    }

    .cmd-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .cmd-icon-wrap {
      padding: 0.625rem;
      border-radius: 0.625rem;
      transition: var(--transition-smooth);
      color: var(--slate-400);
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cmd-card.selected .cmd-icon-wrap {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue-400);
    }

    .cmd-card:not(.selected):hover .cmd-icon-wrap {
      color: white;
    }

    .cmd-copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--slate-500);
      padding: 0.35rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      transition: var(--transition-smooth);
    }

    .cmd-copy-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.06);
    }

    .cmd-card h4 {
      color: white;
      font-weight: 600;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .cmd-check {
      width: 1.375rem;
      height: 1.375rem;
      border-radius: 9999px;
      border: 2px solid var(--slate-700);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      flex-shrink: 0;
    }

    .cmd-card.selected .cmd-check {
      background: var(--gradient-primary);
      border-color: transparent;
    }

    /* ===== LINKS ===== */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }

    @media (min-width: 768px) {
      .links-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      text-decoration: none;
      transition: var(--transition-smooth);
      position: relative;
      backdrop-filter: blur(8px);
    }

    .link-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .link-icon-wrap {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 0.875rem;
      background: var(--slate-800);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.5rem;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .link-icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .link-card h4 {
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
    }

    .link-card:hover h4 {
      color: var(--blue-400);
    }

    .link-card p {
      font-size: 0.75rem;
      color: var(--slate-500);
      margin-top: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 25ch;
    }

    .link-ext {
      position: absolute;
      color: var(--slate-600);
      transition: var(--transition-smooth);
    }

    [dir="rtl"] .link-ext {
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
    }

    [dir="ltr"] .link-ext {
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .link-card:hover .link-ext {
      color: var(--blue-400);
    }

    /* ===== DRIVERS ===== */
    .drivers-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }

    @media (min-width: 768px) {
      .drivers-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .driver-card {
      padding: 1.25rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
    }

    .driver-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .driver-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .driver-icon-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .driver-icon-wrap {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 0.875rem;
      background: var(--slate-800);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .driver-icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .driver-card h4 {
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .driver-card p {
      font-size: 0.75rem;
      color: var(--slate-500);
      margin-top: 0.25rem;
    }

    .copy-driver-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      background: var(--gradient-primary);
      background-size: 200% 200%;
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
      font-family: inherit;
      width: 100%;
      margin-top: 1rem;
    }

    .copy-driver-btn:hover {
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      transform: translateY(-1px);
    }

    .copy-driver-btn.copied-state {
      background: var(--gradient-success);
    }

    /* ===== FLOATING ACTION BAR ===== */
    #action-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      width: calc(100% - 2rem);
      max-width: 52rem;
      display: none;
    }

    #action-bar.visible {
      display: block;
      animation: slideInBottom 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .action-bar-inner {
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: var(--radius-2xl);
      padding: 1.25rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }

    .action-row-1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 0.25rem;
    }

    .sel-count-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .badge {
      background: var(--gradient-primary);
      color: white;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 0.3rem 0.65rem;
      border-radius: 0.5rem;
      min-width: 1.75rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .badge-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
    }

    .show-cmd-btn, .floating-clear-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      padding: 0.4rem 0.85rem;
      border-radius: 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue-400);
      font-family: inherit;
      transition: var(--transition-smooth);
    }

    .show-cmd-btn:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .floating-clear-btn {
      color: var(--red-400);
    }

    .floating-clear-btn:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .cmd-preview {
      display: none;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 0.75rem;
      padding: 0.875rem;
      border: 1px solid var(--glass-border);
      margin-top: 1rem;
      max-height: 12rem;
      overflow-y: auto;
    }

    .cmd-preview.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .cmd-preview code {
      font-size: 0.7rem;
      color: var(--emerald-400);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      word-break: break-all;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (min-width: 768px) {
      .cmd-preview code {
        font-size: 0.8rem;
      }
    }

    .action-row-2 {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .copy-main-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.95rem;
      border-radius: var(--radius-xl);
      font-size: 1rem;
      font-weight: 800;
      border: none;
      cursor: pointer;
      background: var(--gradient-primary);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      color: white;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
      transition: var(--transition-smooth);
      font-family: inherit;
    }

    .copy-main-btn:hover {
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.35);
      transform: translateY(-1px);
    }

    .copy-main-btn.copied-state {
      background: var(--gradient-success);
      animation: none;
    }

    /* ===== MOBILE SEARCH ===== */
    .mobile-search {
      display: block;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
      .mobile-search {
        display: none;
      }
    }

    .mobile-search input {
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 0.85rem 1rem;
      font-size: 0.875rem;
      color: var(--slate-100);
      outline: none;
      font-family: inherit;
      transition: var(--transition-smooth);
      backdrop-filter: blur(8px);
    }

    [dir="rtl"] .mobile-search input {
      padding-right: 2.75rem;
    }

    [dir="ltr"] .mobile-search input {
      padding-left: 2.75rem;
    }

    .mobile-search input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* ===== SECTION HEADERS ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .section-header h3 {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .section-header p {
      color: var(--slate-400);
      font-size: 0.9rem;
    }

    .section-title-center {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .section-title-center h3 {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .section-title-center p {
      color: var(--slate-400);
      font-size: 0.9rem;
    }

    /* ===== TAB PANELS ===== */
    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    /* ===== MODAL ===== */
    #copy-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(8px);
    }

    #copy-modal-overlay.visible {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    #copy-modal {
      background: var(--slate-900);
      border: 1px solid var(--slate-700);
      border-radius: var(--radius-2xl);
      padding: 1.75rem;
      width: 100%;
      max-width: 36rem;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    #copy-modal h3 {
      font-size: 1rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #copy-modal p {
      font-size: 0.8rem;
      color: var(--slate-400);
      margin-bottom: 0.75rem;
    }

    #copy-modal-text {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 0.75rem;
      color: var(--emerald-400);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.875rem;
      resize: none;
      height: 12rem;
      outline: none;
    }

    .modal-close-btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      background: var(--slate-800);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.7rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition-smooth);
    }

    .modal-close-btn:hover {
      background: var(--slate-700);
    }

    /* ===== TOAST ===== */
    #toast-container {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-xl);
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
      pointer-events: auto;
    }

    .toast.out {
      animation: toastOut 0.25s ease both;
    }

    .toast-icon {
      display: flex;
      align-items: center;
    }

    /* ===== SCROLL TO TOP ===== */
    #scroll-top-btn {
      position: fixed;
      z-index: 45;
      bottom: 1.5rem;
      width: 3rem;
      height: 3rem;
      border-radius: 9999px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--slate-400);
      box-shadow: var(--shadow-card);
      transition: var(--transition-smooth);
    }

    [dir="rtl"] #scroll-top-btn {
      left: 1.5rem;
    }

    [dir="ltr"] #scroll-top-btn {
      right: 1.5rem;
    }

    #scroll-top-btn:hover {
      color: white;
      border-color: var(--blue-500);
      background: rgba(59, 130, 246, 0.1);
    }

    #scroll-top-btn.visible {
      display: flex;
      animation: fadeInUp 0.3s ease both;
    }

    /* ===== FOOTER ===== */
    footer {
      padding-block: 3.5rem;
      border-top: 1px solid var(--glass-border);
      margin-top: 5rem;
      background: rgba(2, 6, 23, 0.8);
      position: relative;
      z-index: 1;
    }

    .footer-inner {
      max-width: 1360px;
      margin-inline: auto;
      padding-inline: 1.25rem;
      text-align: center;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .footer-logo span {
      font-size: 1.125rem;
      font-weight: 800;
      color: white;
    }

    .footer-author {
      font-size: 0.9rem;
      color: var(--slate-300);
      font-weight: 700;

        var mouseX = -1000, mouseY = -1000;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', function (e) { mouseX = e.clientX; mouseY = e.clientY; });

        function Particle() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 1.5 + 0.5;
          this.opacity = Math.random() * 0.5 + 0.1;
        }

        for (var i = 0; i < particleCount; i++) particles.push(new Particle());

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

      // =====================================================================
      // STATE (with localStorage persistence)
      // =====================================================================
      var STORAGE_KEY = 'easyinstall_pro_v8_state';

      function loadState() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            var parsed = JSON.parse(saved);
            return {
              lang: parsed.lang || 'ar',
              activeTab: parsed.activeTab || 'install',
              activeCategory: parsed.activeCategory || 'All',
              searchQuery: '',
              selectedIds: parsed.selectedIds || {},
              selectedExtraIds: parsed.selectedExtraIds || {},
              showCommand: false,
              copiedMain: false,
              copiedDriverMap: {},
              copiedExtraMap: {}
            };
          }
        } catch (e) { }
        return null;
      }

      var state = loadState() || {
        lang: 'ar',
        activeTab: 'install',
        activeCategory: 'All',
        searchQuery: '',
        selectedIds: {},
        selectedExtraIds: {},
        showCommand: false,
        copiedMain: false,
        copiedDriverMap: {},
        copiedExtraMap: {}
      };

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            lang: state.lang,
            activeTab: state.activeTab,
            activeCategory: state.activeCategory,
            selectedIds: state.selectedIds,
            selectedExtraIds: state.selectedExtraIds
          }));
        } catch (e) { }
      }

      // =====================================================================
      // TOAST NOTIFICATIONS
      // =====================================================================
      function showToast(message, type) {
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        toast.className = 'toast';
        var iconColor = type === 'success' ? 'var(--emerald-400)' : 'var(--blue-400)';
        var iconSvg = type === 'success'
          ? '<svg width="16" height="16" fill="none" stroke="' + iconColor + '" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
          : '<svg width="16" height="16" fill="none" stroke="' + iconColor + '" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        toast.innerHTML = '<span class="toast-icon">' + iconSvg + '</span>' + esc(message);
        container.appendChild(toast);
        setTimeout(function () {
          toast.classList.add('out');
          setTimeout(function () { toast.remove(); }, 300);
        }, 2500);
      }

      // =====================================================================
      // CLIPBOARD
      // =====================================================================
      function safeCopy(text, onSuccess) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            if (onSuccess) onSuccess();
          }).catch(function () {
            fallbackCopy(text, onSuccess);
          });
        } else {
          fallbackCopy(text, onSuccess);
        }
      }

      function fallbackCopy(text, onSuccess) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;padding:0;border:none;outline:none;boxShadow:none;background:transparent;opacity:0.01;z-index:-1';
        document.body.appendChild(ta);
        ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
        var ok = false;
        try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        if (ok) { if (onSuccess) onSuccess(); }
        else { showCopyModal(text); }
      }

      function showCopyModal(text) {
        var t = TRANSLATIONS[state.lang];
        document.getElementById('copy-modal-title-text').textContent = t.manualCopyTitle;
        document.getElementById('copy-modal-hint').textContent = t.manualCopyHint;
        document.getElementById('copy-modal-text').value = text;
        document.getElementById('copy-modal-overlay').classList.add('visible');
        setTimeout(function () {
          var ta = document.getElementById('copy-modal-text');
          ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
        }, 100);
      }

      document.getElementById('copy-modal-overlay').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('visible');
      });

      // =====================================================================
      // HELPERS
      // =====================================================================
      function getT() { return TRANSLATIONS[state.lang]; }

      function getCategories() {
        var seen = {}, result = ['All'];
        SOFTWARE_LIST.forEach(function (s) {
          if (!seen[s.category]) { seen[s.category] = true; result.push(s.category); }
        });
        return result;
      }

      function getCategoryCount(cat) {
        if (cat === 'All') return SOFTWARE_LIST.length;
        return SOFTWARE_LIST.filter(function (s) { return s.category === cat; }).length;
      }

      function getCatTranslation(cat) {
        var t = getT();
        var key = cat.toLowerCase();
        return t[key] || cat;
      }

      function getFilteredSoftware() {
        return SOFTWARE_LIST.filter(function (s) {
          var matchCat = state.activeCategory === 'All' || s.category === state.activeCategory;
          var q = state.searchQuery.toLowerCase();
          var matchSearch = !q || s.name.toLowerCase().indexOf(q) !== -1 || s.wingetId.toLowerCase().indexOf(q) !== -1;
          return matchCat && matchSearch;
        });
      }

      function getFilteredExtra() {
        var q = state.searchQuery.toLowerCase();
        var t = getT();
        return EXTRA_COMMANDS.filter(function (c) {
          var title = t.extraTitles[c.id] || '';
          return !q || title.toLowerCase().indexOf(q) !== -1 || c.command.toLowerCase().indexOf(q) !== -1;
        });
      }

      function getFilteredLinks() {
        var q = state.searchQuery.toLowerCase();
        return USEFUL_LINKS.filter(function (l) {
          return !q || l.name.toLowerCase().indexOf(q) !== -1 || l.description.toLowerCase().indexOf(q) !== -1;
        });
      }

      function getFilteredDrivers() {
        var q = state.searchQuery.toLowerCase();
        var t = getT();
        return DRIVERS_LIST.filter(function (d) {
          var title = d.id === 'core-runtimes' ? t.coreRuntimesTitle :
            d.id === 'nvidia-app' ? t.nvidiaTitle :
              d.id === 'intel-graphics' ? t.intelTitle : d.title;
          return !q || title.toLowerCase().indexOf(q) !== -1 || d.subtitle.toLowerCase().indexOf(q) !== -1;
        });
      }

      function generateInstallCommand() {
        var selected = SOFTWARE_LIST.filter(function (s) { return state.selectedIds[s.id] && s.wingetId; });
        if (!selected.length) return '';
        var cmds = selected.map(function (s) {
          return 'winget install -e --id ' + s.wingetId + ' --silent --accept-package-agreements --accept-source-agreements --source winget';
        });
        var post = selected.filter(function (s) { return s.postInstallCmd; }).map(function (s) { return s.postInstallCmd; });
        return cmds.concat(post).join('\n\n');
      }

      function generateExtraCommand() {
        var selected = EXTRA_COMMANDS.filter(function (c) { return state.selectedExtraIds[c.id]; });
        return selected.map(function (c) { return c.command; }).join('\n\n');
      }

      function countSelected() {
        return Object.keys(state.selectedIds).filter(function (k) { return state.selectedIds[k]; }).length;
      }

      function countSelectedExtra() {
        return Object.keys(state.selectedExtraIds).filter(function (k) { return state.selectedExtraIds[k]; }).length;
      }

      // =====================================================================
      // ANIMATED COUNTER
      // =====================================================================
      function animateCounter(el, target) {
        var start = 0;
        var duration = 1200;
        var startTime = null;
        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          var progress = Math.min((timestamp - startTime) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.floor(eased * target);
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function renderAll() {
        var t = getT();
        var isRtl = state.lang === 'ar';

        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
        document.documentElement.lang = state.lang;
        document.body.dir = isRtl ? 'rtl' : 'ltr';

        // Lang buttons
        ['ar', 'en', 'tr'].forEach(function (l) {
          var btn = document.getElementById('lang-' + l);
          btn.className = 'lang-btn' + (state.lang === l ? ' active' : '');
        });

        // Search
        ['search-desktop', 'search-mobile'].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.placeholder = t.searchPlaceholder;
        });

        // Hero
        document.getElementById('hero-title').innerHTML = t.heroTitle;
        document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
        document.getElementById('badge-all-updated').textContent = t.allUpdated;
        document.getElementById('badge-secure').textContent = t.secureSource;

        // Hero stats
        document.getElementById('stat-apps-label').textContent = t.statApps;
        document.getElementById('stat-commands-label').textContent = t.statCommands;
        document.getElementById('stat-langs-label').textContent = t.statLangs;

        document.getElementById('tab-install').querySelector('span:last-child').textContent = t.tabInstall;
        document.getElementById('tab-extra').querySelector('span:last-child').textContent = t.tabExtra;
        document.getElementById('tab-links').querySelector('span:last-child').textContent = t.tabLinks;
        document.getElementById('tab-drivers').querySelector('span:last-child').textContent = t.tabDrivers;
        document.getElementById('drive-link-text').textContent = t.driveLink;

        // Tab active states
        document.querySelectorAll('.tab-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
        });

        // Panels
        document.querySelectorAll('.tab-panel').forEach(function (p) {
          p.classList.toggle('active', p.id === 'panel-' + state.activeTab);
        });

        // Sidebar
        document.getElementById('cat-label').textContent = t.categories;
        document.getElementById('quick-tip-title').textContent = t.quickTip;
        document.getElementById('quick-tip-body').textContent = t.adminTip;

        // Search shortcut visibility
        var shortcut = document.getElementById('search-shortcut');
        var searchVal = document.getElementById('search-desktop').value;
        if (shortcut) shortcut.style.display = searchVal ? 'none' : 'block';

        renderCategoryNav();
        renderSoftwareGrid();
        renderExtraGrid();
        renderLinksGrid();
        renderDriversGrid();
        renderActionBar();
        renderFooter();

        saveState();
      }

      function renderCategoryNav() {
        var t = getT();
        var nav = document.getElementById('cat-nav');
        var isRtl = state.lang === 'ar';
        var categories = getCategories();
        var html = '';
        categories.forEach(function (cat) {
          var isActive = state.activeCategory === cat;
          var count = getCategoryCount(cat);
          html += '<button class="cat-btn' + (isActive ? ' active' : '') + '" data-cat="' + cat + '">';
          html += '<span>' + getCatTranslation(cat) + '</span>';
          html += '<span class="cat-count">' + count + '</span>';
          html += '</button>';
        });
        nav.innerHTML = html;
        nav.querySelectorAll('.cat-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            state.activeCategory = this.dataset.cat;
            renderAll();
          });
        });
      }

      function renderSoftwareGrid() {
        var t = getT();
        var filtered = getFilteredSoftware();
        var isRtl = state.lang === 'ar';

        document.getElementById('grid-cat-name').textContent = getCatTranslation(state.activeCategory);
        document.getElementById('grid-count').textContent = ' (' + filtered.length + ' ' + t.apps + ')';

        var selAllBtn = document.getElementById('btn-select-all');
        selAllBtn.textContent = t.selectAll;
        var clearBtn = document.getElementById('btn-clear-sel');
        var cnt = countSelected();
        if (cnt > 0) {
          clearBtn.textContent = t.clearSelection + ' (' + cnt + ')';
          clearBtn.classList.remove('hidden');
        } else {
          clearBtn.classList.add('hidden');
        }

        var grid = document.getElementById('sw-grid');
        var emptyEl = document.getElementById('empty-state');

        if (filtered.length === 0) {
          grid.innerHTML = '';
          emptyEl.classList.remove('hidden');
          document.getElementById('no-sw-title').textContent = t.noSoftware;
          document.getElementById('no-sw-body').textContent = t.tryAgain;
          return;
        }
        emptyEl.classList.add('hidden');

        var html = '';
        filtered.forEach(function (sw, idx) {
          var isSel = !!state.selectedIds[sw.id];
          html += '<div class="sw-card' + (isSel ? ' selected' : '') + '" data-id="' + sw.id + '" id="swcard-' + sw.id + '" style="animation-delay:' + (idx * 0.03) + 's">';
          html += '<div class="sw-card-top">';
          html += '<div class="sw-icon-wrap">';
          if (sw.logo) {
            html += '<img src="' + sw.logo + '" alt="' + esc(sw.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
            html += '<span style="display:none;align-items:center;justify-content:center;color:var(--slate-500);">' + svgIcon('globe', 24) + '</span>';
          } else {
            html += '<span style="display:flex;align-items:center;justify-content:center;color:var(--slate-500);">' + svgIcon('globe', 24) + '</span>';
          }
          html += '</div>';
          html += '<div class="sw-check">' + (isSel ? svgIcon('check', 12) : '') + '</div>';
          html += '</div>';
          html += '<h4>' + esc(sw.name) + '</h4>';
          html += '<p class="sw-winget">' + esc(sw.wingetId) + '</p>';
          html += '<a href="' + sw.url + '" target="_blank" rel="noopener noreferrer" class="sw-link" onclick="event.stopPropagation();">' + svgIcon('externallink', 10) + ' ' + esc(t.visitSite) + '</a>';
          html += '</div>';
        });
        grid.innerHTML = html;

        grid.querySelectorAll('.sw-card').forEach(function (card) {
          card.addEventListener('click', function () {
            var id = this.dataset.id;
            state.selectedIds[id] = !state.selectedIds[id];
            renderAll();
          });
        });
      }

      function renderExtraGrid() {
        var t = getT();
        var filtered = getFilteredExtra();
        var cntExtra = countSelectedExtra();

        var selAllExtra = document.getElementById('btn-select-all-extra');
        selAllExtra.textContent = t.selectAll;
        var clearExtra = document.getElementById('btn-clear-extra');
        if (cntExtra > 0) {
          clearExtra.textContent = t.clearSelection + ' (' + cntExtra + ')';
          clearExtra.classList.remove('hidden');
        } else {
          clearExtra.classList.add('hidden');
        }

        document.getElementById('extra-title').textContent = t.extraCommandsTitle;
        document.getElementById('extra-subtitle').textContent = t.extraCommandsSubtitle;

        var grid = document.getElementById('extra-grid');
        var html = '';
        filtered.forEach(function (cmd) {
          var isSel = !!state.selectedExtraIds[cmd.id];
          var title = t.extraTitles[cmd.id] || cmd.id;
          var isCopied = !!state.copiedExtraMap[cmd.id];
          var essentialClass = cmd.isEssential && !isSel ? ' essential' : '';
          html += '<div class="cmd-card' + (isSel ? ' selected' : '') + essentialClass + '" data-id="' + cmd.id + '">';
          html += '<div class="cmd-card-top">';
          html += '<div style="display:flex;align-items:center;gap:0.75rem;">';
          html += '<div class="cmd-icon-wrap">' + svgIcon(cmd.iconSvg || 'terminal', 24) + '</div>';
          html += '<div class="cmd-check">' + (isSel ? svgIcon('check', 12) : '') + '</div>';
          html += '</div>';
          html += '<button class="cmd-copy-btn" data-id="' + cmd.id + '" onclick="event.stopPropagation();copyExtraCmd(\'' + cmd.id + '\');">';
          html += (isCopied ? '<span style="color:var(--emerald-400);">' + svgIcon('check', 16) + '</span>' : svgIcon('copy', 16));
          html += '</button>';
          html += '</div>';
          html += '<h4>' + esc(title) + '</h4>';
          html += '</div>';
        });
        grid.innerHTML = html;

        grid.querySelectorAll('.cmd-card').forEach(function (card) {
          card.addEventListener('click', function () {
            var id = this.dataset.id;
            state.selectedExtraIds[id] = !state.selectedExtraIds[id];
            renderAll();
          });
        });
      }

      function renderLinksGrid() {
        var t = getT();
        var filtered = getFilteredLinks();

        document.getElementById('links-title').textContent = t.linksTitle;
        document.getElementById('links-subtitle').textContent = t.linksSubtitle;

        var grid = document.getElementById('links-grid');
        var html = '';
        filtered.forEach(function (link) {
          html += '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer" class="link-card">';
          html += '<div class="link-icon-wrap">';
          html += '<img src="' + link.iconUrl + '" alt="' + esc(link.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
          html += '<span style="display:none;align-items:center;justify-content:center;color:var(--slate-500);">' + svgIcon('globe', 24) + '</span>';
          html += '</div>';
          html += '<div style="flex:1;min-width:0;">';
          html += '<h4>' + esc(link.name) + '</h4>';
          html += '<p>' + esc(link.url) + '</p>';
          html += '</div>';
          html += '<span class="link-ext">' + svgIcon('externallink', 16) + '</span>';
          html += '</a>';
        });
        grid.innerHTML = html;
      }

      function renderDriversGrid() {
        var t = getT();
        var filtered = getFilteredDrivers();

        document.getElementById('drivers-title').textContent = t.driversTitle;
        document.getElementById('drivers-subtitle').textContent = t.driversSubtitle;

        var grid = document.getElementById('drivers-grid');
        var html = '';
        filtered.forEach(function (driver) {
          var title = driver.id === 'core-runtimes' ? t.coreRuntimesTitle :
            driver.id === 'nvidia-app' ? t.nvidiaTitle :
              driver.id === 'intel-graphics' ? t.intelTitle : driver.title;
          var subtitle = driver.id === 'core-runtimes' ? t.coreRuntimesDesc : driver.subtitle;
          var isCopied = !!state.copiedDriverMap[driver.id];
          html += '<div class="driver-card">';
          html += '<div class="driver-card-top">';
          html += '<div class="driver-icon-group">';
          html += '<div class="driver-icon-wrap">';
          html += '<img src="' + driver.imageUrl + '" alt="' + esc(title) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
          html += '<span style="display:none;align-items:center;justify-content:center;color:var(--slate-500);">' + svgIcon('globe', 24) + '</span>';
          html += '</div>';
          html += '<div>';
          html += '<h4>' + esc(title) + '</h4>';
          html += '<p>' + esc(subtitle) + '</p>';
          html += '</div>';
          html += '</div>';
          html += '</div>';
          html += '<button class="copy-driver-btn' + (isCopied ? ' copied-state' : '') + '" onclick="copyDriverCmd(\'' + driver.id + '\');">';
          if (isCopied) {
            html += svgIcon('check', 16) + ' ' + esc(t.copied);
          } else {
            html += svgIcon('copy', 16) + ' ' + esc(t.copyCommand);
          }
          html += '</button>';
          html += '</div>';
        });
        grid.innerHTML = html;
      }

      function renderActionBar() {
        var t = getT();
        var cntSw = countSelected();
        var cntEx = countSelectedExtra();
        var bar = document.getElementById('action-bar');
        var showBar = (state.activeTab === 'install' && cntSw > 0) || (state.activeTab === 'extra' && cntEx > 0);

        if (showBar) {
          bar.classList.add('visible');
        } else {
          bar.classList.remove('visible');
          state.showCommand = false;
        }

        var cnt = state.activeTab === 'install' ? cntSw : cntEx;
        document.getElementById('sel-count').textContent = cnt;
        document.getElementById('sel-label').textContent = state.activeTab === 'install' ? t.appsSelected : t.commandsSelected;

        var showBtn = document.getElementById('show-cmd-btn');
        showBtn.textContent = state.showCommand ? t.hideCommand : t.showCommand;
        
        var floatingClear = document.getElementById('floating-clear-btn');
        if (floatingClear) {
          floatingClear.textContent = t.clearSelection;
          if (cnt > 0) {
            floatingClear.classList.remove('hidden');
          } else {
            floatingClear.classList.add('hidden');
          }
        }

        var preview = document.getElementById('cmd-preview');
        var previewCode = document.getElementById('cmd-preview-code');
        if (state.showCommand) {
          preview.classList.add('visible');
          previewCode.textContent = state.activeTab === 'install' ? generateInstallCommand() : generateExtraCommand();
        } else {
          preview.classList.remove('visible');
        }

        var copyBtn = document.getElementById('copy-main-btn');
        var copyIcon = document.getElementById('copy-main-icon');
        var copiedIcon = document.getElementById('copied-main-icon');
        var copyLabel = document.getElementById('copy-main-label');

        if (state.copiedMain) {
          copyBtn.classList.add('copied-state');
          copyIcon.classList.add('hidden');
          copiedIcon.classList.remove('hidden');
          copyLabel.textContent = t.copied;
        } else {
          copyBtn.classList.remove('copied-state');
          copyIcon.classList.remove('hidden');
          copiedIcon.classList.add('hidden');
          copyLabel.textContent = t.copyCommand;
        }
      }

      function renderFooter() {
        var t = getT();
        document.getElementById('footer-author').textContent = t.developedBy;
        document.getElementById('footer-contact').textContent = t.contactUs;
        document.getElementById('footer-privacy').textContent = t.privacy;
        document.getElementById('footer-terms').textContent = t.terms;
        document.getElementById('footer-github').textContent = t.github;
      }

      // =====================================================================
      // ESCAPE HTML
      // =====================================================================
      function esc(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      // =====================================================================
      // GLOBAL HANDLERS
      // =====================================================================
      function copyExtraCmd(id) {
        var cmd = EXTRA_COMMANDS.find(function (c) { return c.id === id; });
        if (!cmd) return;
        var t = getT();
        safeCopy(cmd.command, function () {
          state.copiedExtraMap[id] = true;
          showToast(t.toastCopied, 'success');
          renderAll();
          setTimeout(function () { state.copiedExtraMap[id] = false; renderAll(); }, 2000);
        });
      }

      function copyDriverCmd(id) {
        var driver = DRIVERS_LIST.find(function (d) { return d.id === id; });
        if (!driver) return;
        var t = getT();
        safeCopy(driver.command, function () {
          state.copiedDriverMap[id] = true;
          showToast(t.toastCopiedDriver, 'success');
          renderAll();
          setTimeout(function () { state.copiedDriverMap[id] = false; renderAll(); }, 2000);
        });
      }

      // =====================================================================
      // EVENT WIRING
      // =====================================================================

      // Language buttons
      document.querySelectorAll('.lang-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.lang = this.dataset.lang;
          renderAll();
        });
      });

      // Tab buttons
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.activeTab = this.dataset.tab;
          state.showCommand = false;
          renderAll();
        });
      });

      // Search (desktop)
      var searchDesktop = document.getElementById('search-desktop');
      var clearDesktop = document.getElementById('search-clear-desktop');
      var searchShortcut = document.getElementById('search-shortcut');
      searchDesktop.addEventListener('input', function () {
        state.searchQuery = this.value;
        clearDesktop.classList.toggle('hidden', !this.value);
        if (searchShortcut) searchShortcut.style.display = this.value ? 'none' : 'block';
        renderAll();
      });
      searchDesktop.addEventListener('focus', function () {
        if (searchShortcut) searchShortcut.style.display = 'none';
      });
      searchDesktop.addEventListener('blur', function () {
        if (searchShortcut && !this.value) searchShortcut.style.display = 'block';
      });
      clearDesktop.addEventListener('click', function () {
        state.searchQuery = '';
        searchDesktop.value = '';
        this.classList.add('hidden');
        if (searchShortcut) searchShortcut.style.display = 'block';
        renderAll();
      });

      // Search (mobile)
      var searchMobile = document.getElementById('search-mobile');
      searchMobile.addEventListener('input', function () {
        state.searchQuery = this.value;
        searchDesktop.value = this.value;
        clearDesktop.classList.toggle('hidden', !this.value);
        renderAll();
      });

      // Select all (install tab)
      document.getElementById('btn-select-all').addEventListener('click', function () {
        var filtered = getFilteredSoftware();
        filtered.forEach(function (s) { state.selectedIds[s.id] = true; });
        renderAll();
      });

      // Clear selection (install tab)
      document.getElementById('btn-clear-sel').addEventListener('click', function () {
        state.selectedIds = {};
        renderAll();
      });

      // Floating clear
      var floatingClearBtn = document.getElementById('floating-clear-btn');
      if (floatingClearBtn) {
        floatingClearBtn.addEventListener('click', function () {
          if (state.activeTab === 'install') {
            state.selectedIds = {};
          } else if (state.activeTab === 'extra') {
            state.selectedExtraIds = {};
          }
          renderAll();
        });
      }

      // Select all (extra tab)
      document.getElementById('btn-select-all-extra').addEventListener('click', function () {
        EXTRA_COMMANDS.forEach(function (c) { state.selectedExtraIds[c.id] = true; });
        renderAll();
      });

      // Clear (extra tab)
      document.getElementById('btn-clear-extra').addEventListener('click', function () {
        state.selectedExtraIds = {};
        renderAll();
      });

      // Show/hide command preview
      document.getElementById('show-cmd-btn').addEventListener('click', function () {
        state.showCommand = !state.showCommand;
        renderAll();
      });

      // Main copy button
      document.getElementById('copy-main-btn').addEventListener('click', function () {
        var text = state.activeTab === 'install' ? generateInstallCommand() : generateExtraCommand();
        if (!text) return;
        var t = getT();
        safeCopy(text, function () {
          state.copiedMain = true;
          showToast(t.toastCopied, 'success');
          renderAll();
          setTimeout(function () { state.copiedMain = false; renderAll(); }, 2000);
        });
      });

      // Keyboard shortcut: Ctrl+K for search focus
      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          var searchEl = window.innerWidth >= 768 ? searchDesktop : searchMobile;
          searchEl.focus();
        }
        // Escape to close modal
        if (e.key === 'Escape') {
          document.getElementById('copy-modal-overlay').classList.remove('visible');
        }
      });

      // Header scroll effect
      var header = document.getElementById('app-header');
      var scrollTopBtn = document.getElementById('scroll-top-btn');
      window.addEventListener('scroll', function () {
        if (window.scrollY > 50) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
        if (window.scrollY > 400) {
          scrollTopBtn.classList.add('visible');
        } else {
          scrollTopBtn.classList.remove('visible');
        }
      }, { passive: true });

      scrollTopBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // =====================================================================
      // INIT
      // =====================================================================
      renderAll();

      // Animate hero stats
      setTimeout(function () {
        animateCounter(document.getElementById('stat-apps'), SOFTWARE_LIST.length);
        animateCounter(document.getElementById('stat-commands'), EXTRA_COMMANDS.length);
      }, 300);

    } catch (e) {
      console.error('EasyInstall Pro init error:', e);
    }
  </script>
</body>

</html>
